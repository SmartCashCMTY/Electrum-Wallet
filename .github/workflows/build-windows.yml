name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ecdsa pyaes qrcode pbkdf2 jsonrpclib pysocks pycryptodomex
        pip install dnspython requests protobuf==3.20.0
        pip install PyQt5
        pip install pyinstaller
    
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name Electrum-SMART --icon icons/electrum-smart.ico electrum-smart
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Electrum-SMART-Windows
        path: dist/Electrum-SMART.exe
